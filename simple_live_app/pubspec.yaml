name: simple_live_app
version: 1.8.9+10809
publish_to: none
description: "Slive APP"
environment: 
  sdk: '>=3.0.5 <4.0.0'
  flutter: 3.41.9

dependencies: 
  flutter: 
    sdk: flutter
  flutter_localizations: 
    sdk: flutter

  slive_core:
    path: E:/rustwork/slive_core
  # 图标
  cupertino_icons: ^1.0.8
  remixicon: ^4.9.1 # Remix 图标

  # 框架、工具
  archive: ^4.0.9 # 文件压缩
  get: ^4.7.3 # 状态管理、路由管理、国际化
  dio: ^5.4.3+1 # 网络请求
  hive_ce: ^2.19.3 # 持久化存储
  hive_ce_flutter: ^2.3.4 # 持久化存储
  logger: ^2.7.0 # 日志
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8 # firebase
  firebase_core: ^4.5.0
  intl: ^0.20.2 # 国际化
  pinyin: ^3.3.0
  qr_flutter: ^4.1.0 # 二维码生成
  dynamic_color: ^1.8.1 # 动态颜色
  path: any
  udp: ^5.0.3 # UDP
  fractional_indexing_dart: ^1.0.7
  synchronized: ^3.4.0 # 线程安全
  collection: ^1.19.1
  pool: ^1.5.2 #并发控制器

  # ffi
  rust_lib_simple_live_app:
    path: rust_builder
  flutter_rust_bridge: 2.12.0

  # Widget
  flutter_staggered_grid_view: ^0.7.0 # 瀑布流 / GridView
  flutter_easyrefresh: 2.2.2 # 下拉刷新、上拉加载
  extended_image: ^10.0.1 # 拓展 Image ，支持缓存
  flutter_smart_dialog: ^5.1.0 # 各种弹窗 Toast / Dialog / Popup
  sticky_headers: ^0.3.0+2 # 吸顶
  lottie: ^3.3.2 # Lottie 动画
  canvas_danmaku: ^0.3.1 # 弹幕库

  # 系统交互
  package_info_plus: ^8.3.1 # 包信息
  device_info_plus: ^12.3.0 # 设备信息
  url_launcher: ^6.3.2 # 打开链接
  share_plus: ^12.0.1 # 分享
  path_provider: ^2.1.5 # 常用路径
  cross_file: ^0.3.5+2 # 跨平台文件
  # permission_handler: ^12.0.1 # 权限处理
  permission_handler_apple: ^9.4.7
  permission_handler_android: ^13.0.1
  permission_handler_platform_interface: ^4.3.0
  flutter_image_gallery_saver: ^1.1.3 # 图片保存到相册
  screen_brightness: ^2.1.7 # 亮度控制
  auto_orientation_v2: ^2.3.7 # 屏幕方向
  wakelock_plus: ^1.3.3 # 屏幕常亮
  file_picker: ^10.3.8 # 文件选择
  window_manager: ^0.5.0 # 窗口管理
  floating: ^6.0.0 # PIP 画中画
  flutter_inappwebview:
    git:
      url: https://github.com/guide-inc-org/guide-flutter_inappwebview.git
      path: flutter_inappwebview
      ref: sbi_fx_pc/v6.2.0-beta.3
  connectivity_plus: ^7.0.0 # 网络状态
  qr_code_scanner_plus: ^2.0.14 # 二维码扫描

  # 网络相关
  webdav_client: ^1.2.2 # WebDAV
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  network_info_plus: ^7.0.0
  signalr_netcore: ^1.4.4 # SignalR

  # 视频播放
  volume_controller: any
  media_kit:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: a7d4a070fb4b66cf794893a88a1686156daf20be
      path: ./media_kit
  media_kit_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: a7d4a070fb4b66cf794893a88a1686156daf20be
      path: ./media_kit_video
  media_kit_libs_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: a7d4a070fb4b66cf794893a88a1686156daf20be
      path: ./libs/universal/media_kit_libs_video

dependency_overrides:
  media_kit_libs_linux:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: a7d4a070fb4b66cf794893a88a1686156daf20be
      path: ./libs/linux/media_kit_libs_linux
  media_kit_libs_ios_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: a7d4a070fb4b66cf794893a88a1686156daf20be
      path: ./libs/ios/media_kit_libs_ios_video
  media_kit_libs_android_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: a7d4a070fb4b66cf794893a88a1686156daf20be
      path: ./libs/android/media_kit_libs_android_video
  media_kit_libs_windows_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: a7d4a070fb4b66cf794893a88a1686156daf20be
      path: ./libs/windows/media_kit_libs_windows_video
  media_kit_libs_macos_video:
    git:
      url: https://github.com/Predidit/media-kit.git
      ref: a7d4a070fb4b66cf794893a88a1686156daf20be
      path: ./libs/macos/media_kit_libs_macos_video

dev_dependencies:
  flutter_lints: ^6.0.0
  build_runner: ^2.3.3
  hive_ce_generator: ^1.11.1
  flutter_launcher_icons: ^0.14.4
  flutter_test: 
    sdk: flutter
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/logo.png"

flutter: 
  fonts:
    - family: iconfont
      fonts:
        - asset: assets/iconfont/live_icons.ttf
  uses-material-design: true
  assets:
    - assets/statement.txt
    - assets/images/
    - assets/icons/
    - assets/lotties/
    - assets/fonts/fonts-manifest.json
    - shorebird.yaml
